name: Build and publish release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  desktop:
    name: Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]

    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm test
      - run: npm run tauri build
      - uses: actions/upload-artifact@v4
        with:
          name: mineparser-${{ runner.os }}
          path: src-tauri/target/release/bundle/

  extension:
    name: Browser extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:extension
      - run: npm test
      - run: cd extension && zip -r ../Mineparser-extension.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: mineparser-extension
          path: Mineparser-extension.zip

  publish:
    name: Publish GitHub release
    needs: [desktop, extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Flatten release assets
        run: find release-assets -type f -exec cp {} release-assets/ \; 2>/dev/null || true
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.msi
            release-assets/**/*.exe
            release-assets/**/*.dmg
            release-assets/**/*.AppImage
            release-assets/**/*.deb
            release-assets/**/*.tar.gz
            release-assets/Mineparser-extension.zip
